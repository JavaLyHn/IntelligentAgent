server:
  port: 4000

spring:
  application:
    name: intelligent-agent-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:intelligent_agent}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: IntelligentAgentHikariCP

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.intelligentagent.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: active
      logic-delete-value: 0
      logic-not-delete-value: 1
      insert-strategy: not_null
      update-strategy: not_null
      table-prefix: ""
    banner: false

llm:
  providers:
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:}
      default-model: gpt-4o
    deepseek:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      default-model: deepseek-chat
    tongyi:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${TONGYI_API_KEY:}
      default-model: qwen-plus

logging:
  level:
    com.intelligentagent: INFO
    com.baomidou.mybatisplus: DEBUG
